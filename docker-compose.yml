services:
  # ========== data-agent 应用 ==========
  app:
    build: .
    container_name: data-agent-app
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # Elasticsearch
      - ES_HOST=elasticsearch
      - ES_PORT=9200
      # Qdrant
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      # MySQL
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=agent
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-changeme}
      - MYSQL_DATABASE=data_agent
      # AI
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
    volumes:
      - ./src:/app/src
      - ./data:/app/data
    depends_on:
      elasticsearch:
        condition: service_healthy
      qdrant:
        condition: service_started
      mysql:
        condition: service_healthy
    networks:
      - agent-net
    # 开发模式：保持容器运行
    command: tail -f /dev/null

  # ========== Elasticsearch 8.x ==========
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.3
    container_name: data-agent-es
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - agent-net

  # ========== Qdrant 向量数据库 ==========
  qdrant:
    image: qdrant/qdrant:latest
    container_name: data-agent-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - agent-net

  # ========== MySQL 8.0 ==========
  mysql:
    image: mysql:8.0
    container_name: data-agent-mysql
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-changeme}
      - MYSQL_DATABASE=data_agent
      - MYSQL_USER=agent
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-changeme}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - agent-net

volumes:
  es-data:
  qdrant-data:
  mysql-data:

networks:
  agent-net:
    driver: bridge
